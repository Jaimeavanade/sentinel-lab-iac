name: Deploy Log Analytics + Sentinel + Solutions

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - reinstall-solutions
      solutions:
        description: "CSV de displayName a reinstalar (vacío = todas). Ej: Microsoft Defender XDR, Azure Activity"
        required: false
        default: ""
      includePreview:
        description: "Incluir soluciones Preview (true/false)"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy RG + LAW + Sentinel + Solutions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'deploy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Create Resource Group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name "${{ vars.RESOURCE_GROUP }}" \
              --location "${{ vars.LOCATION }}"

      - name: Deploy Log Analytics Workspace (Bicep)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "${{ vars.RESOURCE_GROUP }}" \
              --template-file "infra/main.bicep" \
              --parameters location="${{ vars.LOCATION }}" \
                          workspaceName="${{ vars.WORKSPACE_NAME }}" \
                          retentionInDays=${{ vars.RETENTION_DAYS }}

      - name: Onboard Sentinel
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            & "${{ github.workspace }}/scripts/01-onboard-sentinel.ps1" `
              -ResourceGroup "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
              -MaxWaitSeconds 180

      - name: Install Sentinel Solutions
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            & "${{ github.workspace }}/scripts/02-install-solutions.ps1" `
              -ResourceGroup "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
              -SolutionsCsv "${{ vars.SENTINEL_SOLUTIONS }}"


  reinstall_contenthub_solutions:
    name: Reinstall Content Hub Solutions
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'reinstall-solutions' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      # (Opcional pero útil para diagnóstico rápido)
      - name: WhoAmI (debug)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az account show
            az account get-access-token --resource https://management.azure.com/ --query expiresOn -o tsv

      - name: Reinstall solutions (Content Hub)
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            # Parse inputs
            $solutionsCsv = "${{ github.event.inputs.solutions }}"
            $solutionList = @()
            if ($solutionsCsv -and $solutionsCsv.Trim().Length -gt 0) {
              $solutionList = $solutionsCsv.Split(",") | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            }

            $includePreview = ("${{ github.event.inputs.includePreview }}".ToLower() -eq "true")

            & "${{ github.workspace }}/scripts/03-reinstall-contenthub-solutions.ps1" `
              -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
              -ResourceGroupName "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
              -SolutionDisplayName $solutionList `
              -IncludePreview:($includePreview) `
              -Verbose
